<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cold Transit</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="icon" href="favicon/favicon.ico">
    <link rel="manifest" href="favicon/site.webmanifest">
</head>
<body>
    <div class="container">
        <main class="hero">
            <div class="hero-left">
                <h1 class="title">Cold<br><span class="highlight">Transit</span></h1>
                <p class="tagline">Escape your catchers in the city maze.</p>
            </div>
            <div class="hero-right">
                <img src="logo.png" alt="Cold Transit Logo" class="hero-logo" />
            </div>
        </main>
        
        <section class="downloads">
            <h2 class="downloads-title">Coming Soon</h2>
            <div class="links">
                <a href="#" class="link-btn store-btn">
                    <img src="steam.svg" alt="Steam" class="store-icon" />
                    Steam
                </a>
                <a href="https://cmlodev.itch.io/cold-transit" class="link-btn store-btn">
                    <img src="itchdotio.svg" alt="itch.io" class="store-icon" />
                    itch.io
                </a>
            </div>
        </section>
    </div>
    <footer class="footer">
        <p>© 2026 Camilo Hernández</p>
        <img src="cmlodev.png" alt="cmlodev" class="footer-logo" />
    </footer>
</body>
</html>
